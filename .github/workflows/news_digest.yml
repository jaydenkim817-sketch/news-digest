name: 뉴스 브리핑 자동 발송

on:
  schedule:
    # 매일 오전 8시 KST (UTC 기준 23:00 전날)
    - cron: '0 23 * * *'
  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # docs/ 폴더를 커밋하기 위해 필요

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install anthropic feedparser

      - name: 뉴스 브리핑 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
        run: python news_digest.py

      - name: GitHub Pages 업데이트 (docs/ 커밋)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "뉴스 브리핑 업데이트: $(date +'%Y-%m-%d')"
          git push
